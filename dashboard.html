<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body {font-family:Arial;}
table {width:100%; border-collapse:collapse;}
th, td {padding:10px; border:1px solid #ccc;}
th {background:#145da0; color:white;}
button {padding:5px 10px;}
</style>
</head>

<body>

<h2>CSC Admin Dashboard</h2>
<button onclick="logout()">Logout</button>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Service</th>
<th>Status</th>
<th>Action</th>
</tr>

<tbody id="data"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// 🔐 Protect page
onAuthStateChanged(auth, user => {
    if(!user){
        window.location.href = "admin.html";
    }
});

// Load data
onValue(ref(db, "customers"), snapshot => {
    let html = "";

    snapshot.forEach(child => {
        let c = child.val();
        let key = child.key;

        html += `
        <tr>
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.mobile}</td>
        <td>${c.service}</td>
        <td>${c.status}</td>
        <td>
        <button onclick="updateStatus('${key}','Approved')">Approve</button>
        <button onclick="updateStatus('${key}','Rejected')">Reject</button>
        </td>
        </tr>`;
    });

    document.getElementById("data").innerHTML = html;
});

// Update status
window.updateStatus = function(key, status){
    update(ref(db, "customers/" + key), {status: status});
}

// Logout
window.logout = function(){
    signOut(auth).then(() => {
        window.location.href = "admin.html";
    });
}
</script>

</body>
</html>
